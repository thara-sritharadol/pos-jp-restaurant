version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: thara-pos-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jp_restaurant
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: